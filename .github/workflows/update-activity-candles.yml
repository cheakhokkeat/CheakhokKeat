name: Update Activity Candlestick Chart

on:
  schedule:
    # Runs once a day at 00:15 UTC. Adjust as you like.
    - cron: "15 0 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate candlestick chart
        env:
          GH_USERNAME: cheakhokkeat
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT_PATH: assets/activity-candles.svg
        run: python scripts/generate_activity_candles.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/activity-candles.svg
          git diff --staged --quiet || git commit -m "chore: update activity candlestick chart"
          git push
