name: Update Activity Candlestick Chart

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - ".github/workflows/update-activity-candles.yml"
      - "scripts/generate_activity_candles.py"

  schedule:
    - cron: "15 0 * * *"

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate candlestick chart
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUT_PATH: assets/activity-candles.svg
        run: python scripts/generate_activity_candles.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/activity-candles.svg

          if git diff --cached --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "chore: update activity candlestick chart"
            git push
          fi